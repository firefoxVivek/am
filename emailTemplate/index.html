<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Akalpit — Team App v2</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f12;--s1:#16161a;--s2:#1c1c22;--s3:#242430;--s4:#2a2a38;
  --border:#252530;--border2:#32324a;
  --text:#f5f3ef;--muted:#606075;--muted2:#9898b0;
  --ak:#ff6b2b;--ak2:rgba(255,107,43,.12);--ak3:rgba(255,107,43,.25);
  --green:#2ecc8a;--green2:rgba(46,204,138,.12);
  --yellow:#f5c842;--yellow2:rgba(245,200,66,.12);
  --red:#ff5252;--red2:rgba(255,82,82,.12);
  --blue:#4d9cf8;--blue2:rgba(77,156,248,.12);
  --purple:#a78bfa;--purple2:rgba(167,139,250,.12);
  --nav-h:64px;
}
html,body{height:100%;background:#07070a;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif}
.phone{width:390px;height:844px;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 0 0 10px #1a1a22,0 0 0 11px #222230,0 40px 100px rgba(0,0,0,.85),0 0 80px rgba(255,107,43,.06);display:flex;flex-direction:column}
@media(max-width:420px){html,body{align-items:flex-start}.phone{width:100%;height:100dvh;border-radius:0;box-shadow:none}}

/* STATUS BAR */
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;background:var(--bg);z-index:10}
.sb-time{font-size:15px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.sb-right{display:flex;gap:5px;align-items:center}

/* HEADER */
.app-header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:9}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-back{width:32px;height:32px;border-radius:10px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.hdr-title em{color:var(--ak);font-style:normal}
.hdr-right{display:flex;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:var(--s3)}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--ak);border:1.5px solid var(--bg)}
.icon-btn svg{width:17px;height:17px;stroke:var(--muted2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* CONTENT AREA */
.content-area{flex:1;overflow:hidden;position:relative}

/* PAGE */
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:none;flex-direction:column;background:var(--bg)}
.page::-webkit-scrollbar{display:none}
.page.active{display:flex;animation:pgIn .22s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* BOTTOM NAV */
.bottom-nav{height:var(--nav-h);background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;z-index:10}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .15s;border:none;background:transparent;padding:0;position:relative}
.nav-item .ni-svg{width:22px;height:22px;transition:transform .2s}
.nav-item .ni-svg svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.nav-item .ni-lbl{font-size:10px;font-weight:600;color:var(--muted);transition:color .15s}
.nav-item.active .ni-svg svg{stroke:var(--ak)}
.nav-item.active .ni-lbl{color:var(--ak)}
.nav-item.active .ni-svg{transform:translateY(-2px)}
.nav-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;border-radius:0 0 2px 2px;background:var(--ak);opacity:0;transition:opacity .15s}
.nav-item.active .nav-bar{opacity:1}
.nav-badge{position:absolute;top:4px;right:8px;background:var(--ak);color:#fff;font-size:8px;font-weight:800;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--s1)}

/* OVERLAY PANEL (slides from right) */
.overlay{position:absolute;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.25,.8,.25,1)}
.overlay.open{transform:translateX(0)}
.overlay-scroll{flex:1;overflow-y:auto;scrollbar-width:none}
.overlay-scroll::-webkit-scrollbar{display:none}

/* ── DEMO SWITCHER ── */
.demo-bar{background:var(--s1);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer}
.demo-label{font-size:10px;color:var(--muted);letter-spacing:.5px}
.demo-name{font-size:12px;font-weight:700;color:var(--text);flex:1}
.demo-role{font-size:10px;color:var(--muted2)}
.demo-arr{font-size:12px;color:var(--muted)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SHARED COMPONENTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.section-lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.lbl-action{font-size:11px;color:var(--ak);letter-spacing:0;text-transform:none;font-weight:700;cursor:pointer}

.card{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:14px}

.btn-primary{background:var(--ak);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;width:100%;transition:opacity .15s,transform .15s;letter-spacing:.2px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--s2);color:var(--text);border:1.5px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.btn-secondary:hover{background:var(--s3)}

.avatar{display:flex;align-items:center;justify-content:center;font-weight:900;border-radius:12px;flex-shrink:0}

.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.3px;display:inline-block}
.badge-high{background:var(--red2);color:var(--red);border:1px solid rgba(255,82,82,.25)}
.badge-med{background:var(--yellow2);color:var(--yellow);border:1px solid rgba(245,200,66,.25)}
.badge-low{background:var(--green2);color:var(--green);border:1px solid rgba(46,204,138,.25)}
.badge-phase{background:var(--s3);color:var(--muted2);border:1px solid var(--border2)}
.badge-done{background:var(--green2);color:var(--green);border:1px solid rgba(46,204,138,.25)}
.badge-pending{background:var(--yellow2);color:var(--yellow);border:1px solid rgba(245,200,66,.25)}
.badge-blocked{background:var(--red2);color:var(--red);border:1px solid rgba(255,82,82,.25)}

/* FORM */
.form-field{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--s2);border:1.5px solid var(--border2);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--ak)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted)}
.form-textarea{resize:none;height:80px}
.form-select option{background:var(--s2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-section-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* MEMBER PICKER */
.member-picker{display:flex;flex-direction:column;gap:6px}
.mp-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:transparent}
.mp-item.selected{border-color:var(--ak);background:var(--ak2)}
.mp-item.selected .mp-check{background:var(--ak);border-color:var(--ak)}
.mp-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent;transition:all .15s}
.mp-item.selected .mp-check{color:#fff}
.mp-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.mp-role{font-size:10px;color:var(--muted2)}

/* CHECKBOX */
.cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;background:transparent}
.cb.done{background:var(--green);border-color:var(--green)}
.cb svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .15s}
.cb.done svg{opacity:1}

/* TAG CHIPS */
.tag-chips{display:flex;flex-wrap:wrap;gap:5px}
.tag-chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid var(--border2);color:var(--muted2);background:var(--s2)}

/* STATUS PILL */
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.sp-active{background:var(--green2);color:var(--green)}
.sp-leave{background:var(--yellow2);color:var(--yellow)}
.sp-hold{background:var(--red2);color:var(--red)}

/* TOAST */
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;opacity:0;transition:all .3s;z-index:200;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:12px 0}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.home-pad{padding:14px 16px 20px}

.greet-card{background:linear-gradient(135deg,#1a1208 0%,#170d04 60%,#120a02 100%);border:1.5px solid var(--ak3);border-radius:20px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.greet-card::after{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,43,.18) 0%,transparent 70%);pointer-events:none}
.gc-tag{display:inline-flex;align-items:center;gap:5px;background:var(--ak2);border:1px solid var(--ak3);border-radius:20px;padding:3px 10px;margin-bottom:8px}
.gc-tag span{font-size:10px;font-weight:700;color:var(--ak);letter-spacing:.5px;text-transform:uppercase}
.gc-name{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px;margin-bottom:2px}
.gc-role{font-size:12px;color:var(--muted2);margin-bottom:12px}
.gc-felicitation{font-size:12px;color:rgba(255,160,100,.85);font-style:italic;border-left:2px solid var(--ak);padding-left:10px;line-height:1.6}

.stats-2x2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.stat-tile{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px}
.st-val{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1}
.st-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}
.st-sub{font-size:10px;margin-top:2px}

.phase-pill-card{background:linear-gradient(135deg,#1a1008,#160d04);border:1.5px solid var(--ak);border-radius:18px;padding:14px;margin-bottom:14px;position:relative;overflow:hidden}
.ppc-eyebrow{font-size:10px;font-weight:700;color:var(--ak);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.ppc-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;line-height:1.3}
.ppc-bar-track{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:5px}
.ppc-bar-fill{height:100%;background:linear-gradient(90deg,var(--ak),#ffaa44);border-radius:3px}
.ppc-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.ppc-members{display:flex;align-items:center;margin-top:10px;gap:6px}
.ppc-av{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;border:2px solid var(--bg);margin-left:-4px}
.ppc-av:first-child{margin-left:0}
.ppc-members-txt{font-size:11px;color:var(--muted2)}

/* ACTIVE MEMBERS STRIP */
.members-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px}
.members-strip::-webkit-scrollbar{display:none}
.member-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:56px}
.mc-av-wrap{position:relative}
.mc-av{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border:2.5px solid transparent;transition:all .15s}
.mc-online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg)}
.mc-dot-green{background:var(--green)}
.mc-dot-yellow{background:var(--yellow)}
.mc-dot-red{background:var(--red)}
.mc-name{font-size:9px;font-weight:600;color:var(--muted2);text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;width:100%;text-overflow:ellipsis}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.qa{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.qa:hover{background:var(--s2)}
.qa-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.qa-txt{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.qa-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MEMBERS MODAL (leave/reason)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:80;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-height:85%;overflow-y:auto;padding:20px;scrollbar-width:none;animation:slideUp .25s ease}
.modal-sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted2);margin-bottom:16px}

.member-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s}
.member-row:last-child{border-bottom:none}
.member-row:hover{opacity:.8}
.mr-av{width:40px;height:40px;border-radius:12px;font-size:12px;font-weight:900}
.mr-info{flex:1}
.mr-name{font-size:13px;font-weight:700;color:var(--text)}
.mr-role{font-size:11px;color:var(--muted2)}
.mr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.leave-reason{font-size:10px;color:var(--yellow);background:var(--yellow2);border:1px solid rgba(245,200,66,.2);padding:2px 8px;border-radius:5px;font-weight:600;max-width:100px;text-align:right;line-height:1.4}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROADMAP PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.road-pad{padding:14px 16px 20px}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--border2)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-22px;top:14px;width:14px;height:14px;border-radius:50%;border:3px solid var(--border2);background:var(--bg);z-index:1}
.tl-dot.active{border-color:var(--ak);background:var(--ak);box-shadow:0 0 10px var(--ak3)}
.tl-dot.done{border-color:var(--green);background:var(--green)}
.tl-card{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:13px;cursor:pointer;transition:all .2s}
.tl-card.active{border-color:var(--ak)}
.tl-card:hover{border-color:var(--border2);transform:translateX(2px)}
.tl-ph-num{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.tl-ph-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:7px}
.tl-b{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.tl-b-active{background:var(--ak2);color:var(--ak);border:1px solid var(--ak3)}
.tl-b-next{background:var(--s3);color:var(--muted2);border:1px solid var(--border2)}
.tl-b-done{background:var(--green2);color:var(--green)}
.tl-members-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tl-mc{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:3px 8px}
.tl-mc-av{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900}
.tl-mc-name{font-size:10px;color:var(--muted2);font-weight:600}
.tl-targets{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px}
.tl-target{display:flex;gap:6px;align-items:flex-start}
.tl-target-dot{width:4px;height:4px;border-radius:50%;background:var(--ak);margin-top:5px;flex-shrink:0}
.tl-target-txt{font-size:11px;color:var(--muted2);line-height:1.5}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   WORKSPACE (TASKS HUB) PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ws-pad{padding:14px 16px 20px}

.ws-tabs{display:flex;gap:4px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px}
.ws-tab{flex:1;padding:7px 4px;border-radius:7px;font-size:11px;font-weight:700;color:var(--muted2);cursor:pointer;text-align:center;border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.ws-tab.active{background:var(--ak);color:#fff}

/* PHASE BOARD */
.phase-board{display:flex;flex-direction:column;gap:12px}
.ph-board-card{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;overflow:hidden}
.ph-board-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--border)}
.ph-board-title{font-size:13px;font-weight:800;color:var(--text);flex:1}
.ph-board-count{font-size:10px;color:var(--muted2)}
.ph-board-chevron{font-size:12px;color:var(--muted);transition:transform .2s}
.ph-board-card.expanded .ph-board-chevron{transform:rotate(90deg)}
.ph-board-tasks{display:none;padding:10px 12px;gap:8px;flex-direction:column}
.ph-board-card.expanded .ph-board-tasks{display:flex}
.ph-board-footer{padding:8px 12px;border-top:1px solid var(--border);display:none}
.ph-board-card.expanded .ph-board-footer{display:block}

/* TASK CARD (detailed) */
.task-card{background:var(--s2);border:1.5px solid var(--border2);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s}
.task-card:hover{border-color:var(--border2)}
.tc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.tc-title{font-size:13px;font-weight:700;color:var(--text);flex:1;line-height:1.4}
.tc-title.done-title{text-decoration:line-through;color:var(--muted)}
.tc-assignees{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.tc-assignee-chip{display:flex;align-items:center;gap:4px;background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:2px 7px}
.tac-av{width:14px;height:14px;border-radius:4px;font-size:6px;font-weight:900;display:flex;align-items:center;justify-content:center}
.tac-name{font-size:10px;color:var(--muted2);font-weight:600}
.tc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tc-by{display:flex;align-items:center;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.tc-by-av{width:16px;height:16px;border-radius:5px;font-size:6px;font-weight:900;display:flex;align-items:center;justify-content:center}
.tc-by-text{font-size:11px;color:var(--muted2)}
.tc-by-name{color:var(--text);font-weight:700}

/* TASK STATUS TABS */
.status-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.status-tabs::-webkit-scrollbar{display:none}
.st-tab{padding:5px 13px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--muted2);background:transparent;white-space:nowrap;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0}
.st-tab.active{border-color:var(--ak);color:var(--ak);background:var(--ak2)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CHAT PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chat-tabs-row{display:flex;gap:6px;padding:12px 16px 0;border-bottom:1px solid var(--border)}
.chat-tab-btn{padding:8px 14px;border-radius:8px 8px 0 0;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;border-bottom:none;color:var(--muted2);background:transparent;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.chat-tab-btn.active{color:var(--ak);border-color:var(--border);border-bottom-color:var(--bg);background:var(--bg);margin-bottom:-1px}
.chat-list-area{padding:8px 12px}
.chat-row{display:flex;align-items:center;gap:11px;padding:10px 8px;border-radius:14px;cursor:pointer;transition:all .15s}
.chat-row:hover{background:var(--s1)}
.cr-av{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;position:relative}
.cr-online{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg)}
.cr-info{flex:1;min-width:0}
.cr-name{font-size:13px;font-weight:700;color:var(--text)}
.cr-last{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cr-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.cr-time{font-size:10px;color:var(--muted)}
.cr-badge{background:var(--ak);color:#fff;font-size:8px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* CHAT WINDOW */
.chat-win{background:var(--bg)}
.cw-hdr{height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cw-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px;scrollbar-width:none}
.cw-messages::-webkit-scrollbar{display:none}
.msg-wrap{display:flex;flex-direction:column;gap:2px}
.msg-wrap.mine{align-items:flex-end}
.msg-wrap.theirs{align-items:flex-start}
.msg-sender-name{font-size:10px;color:var(--muted2);font-weight:600;padding:0 4px}
.msg-bbl{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;max-width:76%}
.msg-wrap.mine .msg-bbl{background:var(--ak);color:#fff;border-bottom-right-radius:4px}
.msg-wrap.theirs .msg-bbl{background:var(--s2);border:1px solid var(--border2);color:var(--text);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--muted);padding:0 4px}
.date-chip{text-align:center;font-size:10px;color:var(--muted);background:var(--s2);padding:3px 12px;border-radius:10px;width:fit-content;margin:4px auto}
.cw-input-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.cw-inp{flex:1;background:var(--s2);border:1.5px solid var(--border2);border-radius:12px;padding:9px 13px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;resize:none;max-height:90px;scrollbar-width:none;transition:border-color .15s}
.cw-inp:focus{border-color:var(--ak)}
.cw-send-btn{width:38px;height:38px;border-radius:12px;background:var(--ak);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cw-send-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PROFILE PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.prof-pad{padding:14px 16px 30px}
.prof-hero{background:linear-gradient(135deg,#1a1410,#160d05);border:1.5px solid var(--ak3);border-radius:20px;padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.ph-av{margin:0 auto 12px;font-weight:900;border:3px solid var(--ak3)}
.ph-name{font-size:20px;font-weight:900;color:var(--text);letter-spacing:-.4px;margin-bottom:3px}
.ph-role{font-size:12px;color:var(--muted2);margin-bottom:12px}
.ph-tags-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.ph-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px}

.att-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.att-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.att-day-lbl{font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase}
.att-dot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1.5px solid var(--border);transition:all .15s}
.att-dot.present{background:var(--green2);border-color:var(--green);color:var(--green)}
.att-dot.absent{background:var(--red2);border-color:var(--red);color:var(--red)}
.att-dot.leave{background:var(--yellow2);border-color:var(--yellow);color:var(--yellow)}
.att-dot.future{opacity:.25;cursor:default}

.goal-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--s1);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.goal-text{font-size:13px;color:var(--text);flex:1;line-height:1.4}
.goal-text.done-goal{text-decoration:line-through;color:var(--muted)}

/* PROFILE ROW (for other member's profile) */
.other-tasks-empty{padding:20px;text-align:center;color:var(--muted);font-size:12px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TASK DETAIL OVERLAY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.td-section{margin-bottom:16px}
.td-section-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.td-assignee-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.td-av{width:36px;height:36px;border-radius:10px;font-size:11px;font-weight:900}
.td-info{flex:1}
.td-name{font-size:13px;font-weight:700;color:var(--text)}
.td-role{font-size:11px;color:var(--muted2)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ADD/EDIT FORMS (overlays)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.form-scroll{flex:1;overflow-y:auto;padding:16px;scrollbar-width:none}
.form-scroll::-webkit-scrollbar{display:none}

.add-phase-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--s1);border:1.5px dashed var(--border2);border-radius:14px;cursor:pointer;color:var(--muted2);font-size:13px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;width:100%}
.add-phase-btn:hover{border-color:var(--ak);color:var(--ak);background:var(--ak2)}

/* HR PANEL */
.hr-update{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px}
.hru-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.hru-title{font-size:14px;font-weight:800;color:var(--text);flex:1;line-height:1.3}
.hru-date{font-size:10px;color:var(--muted);white-space:nowrap}
.hru-body{font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:10px}
.ms-row{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--s2);border-radius:8px;margin-bottom:5px}
.ms-text{font-size:12px;color:var(--muted2);flex:1}
.ms-text.done-ms{text-decoration:line-through;opacity:.5}

/* Lead update */
.lead-upd{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px}
.lu-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.lu-av{width:36px;height:36px;border-radius:10px;font-size:11px;font-weight:900}
.lu-info{flex:1}
.lu-name{font-size:13px;font-weight:800;color:var(--text)}
.lu-field{font-size:10px;color:var(--muted2)}
.lu-time{font-size:10px;color:var(--muted)}
.lu-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:5px}
.lu-body{font-size:12px;color:var(--muted2);line-height:1.6}
.lu-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:8px}

/* empty */
.empty-view{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:8px;text-align:center}
.ev-icon{font-size:38px;opacity:.35}
.ev-text{font-size:13px;color:var(--muted2)}

@keyframes slideInR{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>
</head>
<body>
<div class="phone" id="phone">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="sb-time" id="clockEl">9:41</div>
    <div class="sb-right" style="color:var(--text)">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity=".3"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 12" fill="currentColor"><rect x="0" y="0" width="22" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="2" width="14" height="8" rx="1.5"/><rect x="22.5" y="3.5" width="1.5" height="5" rx=".75"/></svg>
    </div>
  </div>

  <!-- APP HEADER -->
  <div class="app-header">
    <div class="hdr-left">
      <div class="hdr-back" id="globalBack" onclick="handleBack()" style="display:none">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--muted2)" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="hdr-title" id="hdrTitle">Akalpit <em>Team</em></div>
    </div>
    <div class="hdr-right">
      <div class="icon-btn" id="hrBtn" onclick="openOverlay('hrOverlay')" style="display:none" title="HR Panel">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="icon-btn" id="leadBtn" onclick="openOverlay('leadOverlay')" style="display:none" title="Lead Updates">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="icon-btn" style="position:relative" onclick="toast('🔔 Notifications coming soon!')">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <div class="notif-dot"></div>
      </div>
    </div>
  </div>

  <!-- DEMO SWITCHER -->
  <div class="demo-bar" onclick="openOverlay('switcherOverlay')">
    <span class="demo-label">Viewing as</span>
    <span class="demo-name" id="demoName">Vivek Raj Srivastava</span>
    <span class="demo-role" id="demoRole">Founder</span>
    <span class="demo-arr">⌄</span>
  </div>

  <!-- CONTENT AREA -->
  <div class="content-area">

    <!-- PAGE: HOME -->
    <div class="page active" id="page-home">
      <div class="home-pad" id="homeContent"></div>
    </div>

    <!-- PAGE: ROADMAP -->
    <div class="page" id="page-roadmap">
      <div class="road-pad" id="roadmapContent"></div>
    </div>

    <!-- PAGE: WORKSPACE (Tasks Hub) -->
    <div class="page" id="page-workspace">
      <div class="ws-pad" id="wsContent"></div>
    </div>

    <!-- PAGE: CHAT -->
    <div class="page" id="page-chat">
      <div class="chat-tabs-row">
        <button class="chat-tab-btn active" onclick="switchChatTab('dm',this)">Direct</button>
        <button class="chat-tab-btn" onclick="switchChatTab('group',this)">Groups</button>
      </div>
      <div id="chatListDM" class="chat-list-area"></div>
      <div id="chatListGroup" class="chat-list-area" style="display:none"></div>
    </div>

    <!-- PAGE: PROFILE -->
    <div class="page" id="page-profile">
      <div class="prof-pad" id="profileContent"></div>
    </div>

    <!-- OVERLAY: CHAT WINDOW -->
    <div class="overlay" id="chatWin" style="display:flex;flex-direction:column;transform:translateX(100%)">
      <div class="cw-hdr">
        <div class="icon-btn" onclick="closeOverlay('chatWin')">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--muted2)" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div id="cwAv" style="width:34px;height:34px;border-radius:10px;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center"></div>
        <div style="flex:1">
          <div id="cwName" style="font-size:14px;font-weight:800;color:var(--text)"></div>
          <div id="cwStatus" style="font-size:11px;color:var(--green)"></div>
        </div>
      </div>
      <div class="cw-messages" id="cwMsgs"></div>
      <div class="cw-input-row">
        <textarea class="cw-inp" id="cwInp" placeholder="Message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button class="cw-send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <!-- OVERLAY: MEMBER DETAIL (profile of another person) -->
    <div class="overlay" id="memberDetailOverlay" style="display:flex;flex-direction:column">
      <div class="cw-hdr">
        <div class="icon-btn" onclick="closeOverlay('memberDetailOverlay')">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--muted2)" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div id="mdHdrTitle" style="font-size:16px;font-weight:800;color:var(--text);flex:1">Member Profile</div>
      </div>
      <div class="overlay-scroll"><div style="padding:16px 16px 30px" id="memberDetailContent"></div></div>
    </div>

    <!-- OVERLAY: TASK DETAIL -->
    <div class="overlay" id="taskDetailOverlay" style="display:flex;flex-direction:column">
      <div class="cw-hdr">
        <div class="icon-btn" onclick="closeOverlay('taskDetailOverlay')">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--muted2)" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div style="font-size:16px;font-weight:800;color:var(--text);flex:1">Task Detail</div>
        <div class="icon-btn" id="tdEditBtn" onclick="openTaskForm(null,'edit')">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>
      <div class="overlay-scroll"><div style="padding:16px" id="taskDetailContent"></div></div>
    </div>

    <!-- OVERLAY: CREATE/EDIT TASK -->
    <div class="overlay" id="taskFormOverlay" style="display:flex;flex-direction:column">
      <div class="cw-hdr">
        <div class="icon-btn" onclick="closeOverlay('taskFormOverlay')">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--muted2)" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div id="taskFormTitle" style="font-size:16px;font-weight:800;color:var(--text);flex:1">Create Task</div>
      </div>
      <div class="form-scroll" id="taskFormContent"></div>
    </div>

    <!-- OVERLAY: CREATE PHASE -->
    <div class="overlay" id="phaseFormOverlay" style="display:flex;flex-direction:column">
      <div class="cw-hdr">
        <div class="icon-btn" onclick="closeOverlay('phaseFormOverlay')">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--muted2)" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div style="font-size:16px;font-weight:800;color:var(--text)">Create Phase Board</div>
      </div>
      <div class="form-scroll">
        <div class="form-field"><label class="form-label">Phase Name</label><input class="form-input" id="phaseName" placeholder="e.g. Phase 2 — Beta Testing"></div>
        <div class="form-field"><label class="form-label">Description</label><textarea class="form-textarea" id="phaseDesc" placeholder="What is this phase about?"></textarea></div>
        <div class="form-field"><label class="form-label">Status</label>
          <select class="form-select" id="phaseStatus">

function renderWorkspace(){
  const canAdmin = CU.isAdmin || CU.isHR;
  const allTasks = PHASES.flatMap(p=>p.tasks);
  const myTasks = allTasks.filter(t=>t.assignedTo.includes(CU.id));

  let tasksToShow = wsTab==='mytasks' ? myTasks : wsTab==='all' ? allTasks : null;
  if(wsStatusFilter!=='all' && tasksToShow) tasksToShow = tasksToShow.filter(t=>{
    if(wsStatusFilter==='pending') return t.status==='pending';
    if(wsStatusFilter==='inprogress') return t.status==='inprogress';
    if(wsStatusFilter==='done') return t.status==='done';
    if(wsStatusFilter==='high') return t.priority==='high';
    return true;
  });

  const boardHTML = PHASES.map(ph=>{
    const taskCount = ph.tasks.length;
    const doneCount = ph.tasks.filter(t=>t.status==='done').length;
    const tasksHTML = ph.tasks.length ? ph.tasks.map(t=>renderTaskCard(t)).join('') : '<div style="padding:8px 4px;font-size:11px;color:var(--muted);text-align:center">No tasks yet</div>';
    const addBtn = canAdmin ? `<button class="btn-secondary" style="width:100%;font-size:12px;padding:8px" onclick="openTaskForm('${ph.id}','create')">+ Add Task</button>` : '';
    return `<div class="ph-board-card" id="phboard-${ph.id}">
      <div class="ph-board-header" onclick="togglePhaseBoard('${ph.id}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${ph.color};flex-shrink:0"></div>
        <div class="ph-board-title">${ph.name}</div>
        <div class="ph-board-count">${doneCount}/${taskCount}</div>
        <div class="ph-board-chevron">▶</div>
      </div>
      <div class="ph-board-tasks">${tasksHTML}</div>
      ${addBtn?`<div class="ph-board-footer">${addBtn}</div>`:''}
    </div>`;
  }).join('');

  const listHTML = tasksToShow ? (tasksToShow.length ? tasksToShow.map(t=>renderTaskCard(t)).join('') : '<div class="empty-view"><div class="ev-icon">✅</div><div class="ev-text">No tasks here!</div></div>') : '';

  document.getElementById('wsContent').innerHTML = `
    <div class="ws-tabs">
      <button class="ws-tab ${wsTab==='board'?'active':''}" onclick="switchWsTab('board',this)">Phase Board</button>
      <button class="ws-tab ${wsTab==='mytasks'?'active':''}" onclick="switchWsTab('mytasks',this)">My Tasks</button>
      <button class="ws-tab ${wsTab==='all'?'active':''}" onclick="switchWsTab('all',this)">All Tasks</button>
    </div>

    ${wsTab!=='board'?`<div class="status-tabs">
      <button class="st-tab ${wsStatusFilter==='all'?'active':''}" onclick="switchWsFilter('all',this)">All</button>
      <button class="st-tab ${wsStatusFilter==='pending'?'active':''}" onclick="switchWsFilter('pending',this)">Pending</button>
      <button class="st-tab ${wsStatusFilter==='inprogress'?'active':''}" onclick="switchWsFilter('inprogress',this)">In Progress</button>
      <button class="st-tab ${wsStatusFilter==='done'?'active':''}" onclick="switchWsFilter('done',this)">Done</button>
      <button class="st-tab ${wsStatusFilter==='high'?'active':''}" onclick="switchWsFilter('high',this)">🔴 High</button>
    </div>`:''}

    ${wsTab==='board' ? `<div class="phase-board">${boardHTML}</div>` : `<div>${listHTML}</div>`}

    ${canAdmin&&wsTab==='board'?`<div style="margin-top:12px"><button class="add-phase-btn" onclick="openOverlay('phaseFormOverlay')">＋ Create New Phase Board</button></div>`:''}`;
}

function renderTaskCard(t){
  const creator = TEAM.find(m=>m.id===t.createdBy);
  const assignees = t.assignedTo.map(id=>{const m=TEAM.find(x=>x.id===id);return m?`<div class="tc-assignee-chip"><div class="tac-av" style="background:${m.bg};color:${m.color}">${m.initials}</div><div class="tac-name">${m.short}</div></div>`:''}).join('');
  const statusCol = t.status==='done'?'var(--green)':t.status==='inprogress'?'var(--yellow)':'var(--muted)';
  return `<div class="task-card" onclick="showTaskDetail('${t.id}')">
    <div class="tc-header">
      <div class="cb ${t.status==='done'?'done':''}" onclick="cycleTaskStatus('${t.id}',event)"><svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg></div>
      <div class="tc-title ${t.status==='done'?'done-title':''}">${t.title}</div>
    </div>
    <div class="tc-assignees">${assignees}</div>
    <div class="tc-meta">
      <span class="badge ${t.priority==='high'?'badge-high':t.priority==='med'?'badge-med':'badge-low'}">${t.priority==='high'?'High':t.priority==='med'?'Med':'Low'}</span>
      <span class="badge" style="background:${t.status==='done'?'var(--green2)':t.status==='inprogress'?'var(--yellow2)':'var(--s3)'};color:${statusCol};border:1px solid ${statusCol}33">${t.status==='done'?'Done':t.status==='inprogress'?'In Progress':'Pending'}</span>
      <span style="font-size:10px;color:var(--muted)">${t.createdAt}</span>
    </div>
    <div class="tc-by">
      <div class="tc-by-av" style="background:${creator.bg};color:${creator.color}">${creator.initials}</div>
      <div class="tc-by-text">By <span class="tc-by-name">${creator.short}</span></div>
    </div>
  </div>`;
}

function togglePhaseBoard(phId){
  const el = document.getElementById(`phboard-${phId}`);
  el.classList.toggle('expanded');
}
function switchWsTab(tab,btn){
  wsTab=tab;wsStatusFilter='all';
  document.querySelectorAll('.ws-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderWorkspace();
}
function switchWsFilter(f,btn){
  wsStatusFilter=f;
  document.querySelectorAll('.st-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderWorkspace();
}

// ── TASK DETAIL ──

    <div style="margin-bottom:16px">
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span class="badge ${t.priority==='high'?'badge-high':t.priority==='med'?'badge-med':'badge-low'}">${t.priority==='high'?'🔴 High':t.priority==='med'?'🟡 Medium':'🟢 Low'}</span>

      </div>
      <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.3">${t.title}</div>
      <div style="font-size:13px;color:var(--muted2);line-height:1.6">${t.desc}</div>
    </div>

    <div class="divider"></div>
    <div class="td-section">
      <div class="td-section-title">Created By</div>
      <div class="td-assignee-row"><div class="td-av avatar" style="background:${creator.bg};color:${creator.color};width:36px;height:36px;font-size:11px">${creator.initials}</div><div class="td-info"><div class="td-name">${creator.name}</div><div class="td-role">${creator.role.split('·')[0].trim()}</div></div><span style="font-size:10px;color:var(--muted)">${t.createdAt}</span></div>

      </div>
    </div>`;

  editingTaskId = taskId;
  openOverlay('taskDetailOverlay');
}

function setTaskStatus(taskId, status){
  const t = findTask(taskId);
  t.status = status;
  showTaskDetail(taskId);
  renderWorkspace();
  toast(status==='done'?'✅ Task marked done!':status==='inprogress'?'⏳ In Progress':'⏸ Moved to Pending');
}

function cycleTaskStatus(taskId, e){
  e.stopPropagation();
  const t = findTask(taskId);
  t.status = t.status==='pending'?'inprogress':t.status==='inprogress'?'done':'pending';
  renderWorkspace();
  toast(t.status==='done'?'✅ Done!':t.status==='inprogress'?'⏳ In Progress':'⏸ Pending');
}

function findTask(id){ return PHASES.flatMap(p=>p.tasks).find(t=>t.id===id); }

      <div style="width:28px;height:28px;border-radius:8px;background:${m.bg};color:${m.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0">${m.initials}</div>
      <div class="mp-name">${m.short}</div>
      <div class="mp-role">${m.role.split('·')[0].trim()}</div>
    </div>`).join('');

  const phaseOpts = PHASES.map(p=>`<option value="${p.id}" ${(isEdit?PHASES.find(ph=>ph.tasks.some(x=>x.id===editingTaskId))?.id:phaseId)===p.id?'selected':''}>${p.name}</option>`).join('');

  document.getElementById('taskFormContent').innerHTML = `
    <div class="form-section-title">Task Details</div>
    <div class="form-field"><label class="form-label">Task Title *</label><input class="form-input" id="tf-title" placeholder="What needs to be done?" value="${isEdit?t.title:''}"></div>
    <div class="form-field"><label class="form-label">Description</label><textarea class="form-textarea" id="tf-desc" placeholder="More details...">${isEdit?t.desc:''}</textarea></div>
    <div class="form-row">
      <div class="form-field"><label class="form-label">Priority</label><select class="form-select" id="tf-priority"><option value="high" ${isEdit&&t.priority==='high'?'selected':''}>🔴 High</option><option value="med" ${!isEdit||t.priority==='med'?'selected':''}>🟡 Medium</option><option value="low" ${isEdit&&t.priority==='low'?'selected':''}>🟢 Low</option></select></div>
      <div class="form-field"><label class="form-label">Status</label><select class="form-select" id="tf-status"><option value="pending" ${!isEdit||t.status==='pending'?'selected':''}>Pending</option><option value="inprogress" ${isEdit&&t.status==='inprogress'?'selected':''}>In Progress</option><option value="done" ${isEdit&&t.status==='done'?'selected':''}>Done</option></select></div>
    </div>
    <div class="form-field"><label class="form-label">Phase / Board</label><select class="form-select" id="tf-phase">${phaseOpts}</select></div>
    <div class="form-section-title" style="margin-top:4px">Assign To (select members)</div>
    <div class="member-picker" style="margin-bottom:16px">${memberPicker}</div>
    <button class="btn-primary" onclick="saveTask(${isEdit})">${isEdit?'Save Changes →':'Create Task →'}</button>
    <div style="height:20px"></div>`;

  openOverlay('taskFormOverlay');
}

function toggleMemberPick(id){
  if(taskFormSelectedMembers.includes(id)) taskFormSelectedMembers = taskFormSelectedMembers.filter(x=>x!==id);
  else taskFormSelectedMembers.push(id);
  document.getElementById(`mp-${id}`).classList.toggle('selected', taskFormSelectedMembers.includes(id));
}

function saveTask(isEdit){
  const title = document.getElementById('tf-title').value.trim();
  if(!title){ toast('Enter a task title!'); return; }
  if(!taskFormSelectedMembers.length){ toast('Select at least one member!'); return; }

  const priority = document.getElementById('tf-priority').value;
  const status = document.getElementById('tf-status').value;
  const newPhaseId = document.getElementById('tf-phase').value;
  const desc = document.getElementById('tf-desc').value.trim();

  if(isEdit && editingTaskId){
    const t = findTask(editingTaskId);
    t.title = title; t.desc = desc; t.priority = priority; t.status = status;
    t.assignedTo = [...taskFormSelectedMembers];
    // move to different phase if changed
    PHASES.forEach(p=>{ p.tasks = p.tasks.filter(x=>x.id!==editingTaskId); });
    PHASES.find(p=>p.id===newPhaseId)?.tasks.push(t);
    toast('✅ Task updated!');
  } else {
    const newTask = {id:'t'+Date.now(), title, desc, priority, status, createdBy:CU.id, assignedTo:[...taskFormSelectedMembers], createdAt:'Just now'};
    PHASES.find(p=>p.id===newPhaseId)?.tasks.push(newTask);
    toast('✅ Task created!');
  }

  closeOverlay('taskFormOverlay');
  renderWorkspace();
  if(isEdit) closeOverlay('taskDetailOverlay');
}

function savePhase(){
  const name = document.getElementById('phaseName').value.trim();
  if(!name){ toast('Enter phase name!'); return; }
  const newPhase = {id:'ph'+Date.now(), num:String(PHASES.length+1).padStart(2,'0'), name, status:document.getElementById('phaseStatus').value, color:'#a78bfa', memberIds:[], targets:[], tasks:[]};
  PHASES.push(newPhase);
  closeOverlay('phaseFormOverlay');
  renderWorkspace();
  toast('✅ Phase created!');
}

// ╔═══════════════════════════════════════════╗
// ║                CHAT PAGE                 ║
// ╚═══════════════════════════════════════════╝
function renderChat(){
  const listDM = document.getElementById('chatListDM');
  listDM.innerHTML = CHATS_DM.map(c=>{
    const other = TEAM.find(m=>m.id===c.with);
    const last = c.messages[c.messages.length-1];
    const unread = c.messages.filter(m=>m.from!==CU.id&&m.from!=='vivek').length;
    return `<div class="chat-row" onclick="openChat('dm','${c.id}')">
      <div class="cr-av" style="background:${other.bg};color:${other.color};font-size:13px;font-weight:900">
        ${other.initials}
        ${other.status==='active'?'<div class="cr-online"></div>':''}
      </div>
      <div class="cr-info">
        <div class="cr-name">${other.name}</div>
        <div class="cr-last">${last.text}</div>
      </div>
      <div class="cr-meta">
        <div class="cr-time">${last.time}</div>
        ${unread?`<div class="cr-badge">${unread}</div>`:''}
      </div>
    </div>`;
  }).join('');

  const listGroup = document.getElementById('chatListGroup');
  listGroup.innerHTML = CHATS_GROUP.map(g=>{
    const last = g.messages[g.messages.length-1];
    return `<div class="chat-row" onclick="openChat('group','${g.id}')">
      <div class="cr-av" style="background:var(--s3);font-size:20px">${g.emoji}</div>
      <div class="cr-info">
        <div class="cr-name">${g.name}</div>
        <div class="cr-last"><strong>${last.senderName}:</strong> ${last.text}</div>
      </div>
      <div class="cr-meta"><div class="cr-time">${last.time}</div></div>
    </div>`;
  }).join('');
}

function switchChatTab(mode, btn){
  chatMode = mode;
  document.querySelectorAll('.chat-tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('chatListDM').style.display = mode==='dm'?'block':'none';
  document.getElementById('chatListGroup').style.display = mode==='group'?'block':'none';
}

function openChat(type, id){
  const win = document.getElementById('chatWin');
  const msgs = document.getElementById('cwMsgs');
  let other, data;

  if(type==='dm'){
    data = CHATS_DM.find(c=>c.id===id);
    other = TEAM.find(m=>m.id===data.with);
    document.getElementById('cwAv').style.cssText = `background:${other.bg};color:${other.color};width:34px;height:34px;border-radius:10px;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center`;
    document.getElementById('cwAv').textContent = other.initials;
    document.getElementById('cwName').textContent = other.name;
    document.getElementById('cwStatus').textContent = other.status==='active'?'● Online':'● Away';
    document.getElementById('cwStatus').style.color = other.status==='active'?'var(--green)':'var(--muted)';
    msgs.innerHTML = '<div class="date-chip">Today</div>' + data.messages.map(m=>`
      <div class="msg-wrap ${m.from===CU.id||m.from==='vivek'?'mine':'theirs'}">
        <div class="msg-bbl">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>`).join('');
  } else {
    data = CHATS_GROUP.find(g=>g.id===id);
    document.getElementById('cwAv').style.cssText = 'background:var(--s3);width:34px;height:34px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center';
    document.getElementById('cwAv').textContent = data.emoji;
    document.getElementById('cwName').textContent = data.name;
    document.getElementById('cwStatus').textContent = data.memberIds.join(' · ');
    document.getElementById('cwStatus').style.color = 'var(--muted2)';
    msgs.innerHTML = '<div class="date-chip">Today</div>' + data.messages.map(m=>{
      const isMe = m.from===CU.id || (CU.id==='vivek'&&m.from==='vivek');
      return `<div class="msg-wrap ${isMe?'mine':'theirs'}">
        ${!isMe?`<div class="msg-sender-name">${m.senderName}</div>`:''}
        <div class="msg-bbl">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>`;
    }).join('');
  }
  win.dataset.chatId=id; win.dataset.chatType=type;
  win.classList.add('open');
  setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,80);
}

function sendMsg(){
  const inp = document.getElementById('cwInp');
  const txt = inp.value.trim(); if(!txt) return;
  const msgs = document.getElementById('cwMsgs');
  const now = new Date();
  const t = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const div = document.createElement('div'); div.className='msg-wrap mine';
  div.innerHTML=`<div class="msg-bbl">${txt}</div><div class="msg-time">${t}</div>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight; inp.value='';
  const replies=['Got it! 👍','Sure, will do','On it!','ACha theek hai','Haan bhai!','Noted 🙏'];
  setTimeout(()=>{
    const rd=document.createElement('div'); rd.className='msg-wrap theirs';
    rd.innerHTML=`<div class="msg-bbl">${replies[Math.floor(Math.random()*replies.length)]}</div><div class="msg-time">${t}</div>`;
    msgs.appendChild(rd); msgs.scrollTop=msgs.scrollHeight;
  },1500);
}

// ╔═══════════════════════════════════════════╗
// ║              PROFILE PAGE                ║
// ╚═══════════════════════════════════════════╝
function renderProfile(u){
  const myTasks = PHASES.flatMap(p=>p.tasks.filter(t=>t.assignedTo.includes(u.id)));
  const doneCount = myTasks.filter(t=>t.status==='done').length;
  const days=['M','T','W','T','F','S','S'];

  const attGrid = days.map((d,i)=>{
    const v = attStates[`${u.id}_${i}`];
    const isToday = i===4;
    return `<div class="att-cell">
      <div class="att-day-lbl">${d}</div>
      <div class="att-dot ${v===1?'present':v===0?'absent':v===null?'future':'leave'}${isToday?' today':''}" onclick="toggleAtt('${u.id}',${i})">
        ${v===1?'✓':v===0?'✗':'–'}
      </div>
    </div>`;
  }).join('');

  const goals = u.goals.map((g,i)=>{
    const done = goalStates[`${u.id}_${i}`];
    return `<div class="goal-item">
      <div class="cb ${done?'done':''}" onclick="toggleGoal('${u.id}',${i})"><svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg></div>
      <div>
        <div class="goal-text ${done?'done-goal':''}">${g}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">Personal goal</div>
      </div>
    </div>`;
  }).join('');

  const taskPrev = myTasks.slice(0,3).map(t=>`
    <div style="display:flex;align-items:center;gap:8px;padding:9px;background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer" onclick="showTaskDetail('${t.id}')">
      <div style="width:8px;height:8px;border-radius:50%;background:${t.status==='done'?'var(--green)':t.status==='inprogress'?'var(--yellow)':'var(--muted)'};flex-shrink:0"></div>
      <div style="flex:1;font-size:12px;font-weight:600;color:${t.status==='done'?'var(--muted)':'var(--text)'}${t.status==='done'?';text-decoration:line-through':''}">${t.title}</div>
      <span class="badge ${t.priority==='high'?'badge-high':t.priority==='med'?'badge-med':'badge-low'}">${t.priority==='high'?'H':t.priority==='med'?'M':'L'}</span>
    </div>`).join('');

  document.getElementById('profileContent').innerHTML = `
    <div class="prof-hero">
      <div class="ph-av avatar" style="background:${u.bg};color:${u.color};width:68px;height:68px;font-size:22px;border:3px solid ${u.color}44">${u.initials}</div>
      <div class="ph-name">${u.name}</div>
      <div class="ph-role">${u.role}</div>
      <div class="ph-tags-row">
        <span class="ph-tag" style="background:var(--ak2);color:var(--ak);border:1px solid var(--ak3)">${u.app==='both'?'Akalpit + Penverse':u.app==='akalpit'?'Akalpit':'Penverse'}</span>
        ${u.isHR?'<span class="ph-tag" style="background:var(--purple2);color:var(--purple);border:1px solid rgba(167,139,250,.25)">HR Manager</span>':''}
        ${u.isAdmin?'<span class="ph-tag" style="background:var(--ak2);color:var(--ak);border:1px solid var(--ak3)">Admin</span>':''}
        ${u.isLead?'<span class="ph-tag" style="background:var(--blue2);color:var(--blue);border:1px solid rgba(77,156,248,.25)">Lead</span>':''}
        <span class="status-pill ${u.status==='active'?'sp-active':u.status==='leave'?'sp-leave':'sp-hold'}">${u.status==='active'?'● Active':u.status==='leave'?'On Leave':'On Hold'}</span>
      </div>
      ${u.leaveReason?`<div style="margin-top:10px;font-size:11px;color:var(--yellow);background:var(--yellow2);border:1px solid rgba(245,200,66,.2);padding:7px 12px;border-radius:8px;text-align:left">${u.leaveReason}</div>`:''}
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px">
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--ak)">${myTasks.length}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Total</div></div>
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--green)">${doneCount}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Done</div></div>
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--yellow)">${myTasks.length-doneCount}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Pending</div></div>
    </div>

    <div class="section-lbl">This Week — Attendance</div>
    <div class="card" style="margin-bottom:14px"><div class="att-grid">${attGrid}</div></div>

    <div class="section-lbl">Active Tasks <span class="lbl-action" onclick="switchPage('workspace')">All →</span></div>
    ${taskPrev || '<div style="color:var(--muted);font-size:12px;padding:10px">No active tasks</div>'}

    <div class="section-lbl" style="margin-top:14px">Goals <span class="lbl-action" onclick="addGoalPrompt()">+ Add</span></div>
    ${goals}
    <div style="height:10px"></div>`;
}

function toggleAtt(uid,day){
  const k=`${uid}_${day}`; if(attStates[k]===null) return;
  attStates[k] = attStates[k]===1?0:1;
  renderProfile(CU); toast(attStates[k]===1?'✅ Present':'❌ Absent');
}
function toggleGoal(uid,i){
  const k=`${uid}_${i}`; goalStates[k]=!goalStates[k];
  renderProfile(CU); toast(goalStates[k]?'🎯 Goal done!':'↩ Reopened');
}
function addGoalPrompt(){
  const g=prompt('New goal:'); if(g&&g.trim()){ CU.goals.push(g.trim()); renderProfile(CU); toast('🎯 Goal added!'); }
}

// ║              HR PANEL                    ║
// ╚═══════════════════════════════════════════╝
function renderHRPanel(){
  const canEdit = CU.isHR || CU.isAdmin;

  // form
  document.getElementById('hrFormArea').innerHTML = `
    <div class="form-section-title">Push New Update</div>
    <div class="form-field"><label class="form-label">Title</label><input class="form-input" id="hr-title" placeholder="Update title..."></div>
    <div class="form-field"><label class="form-label">Body</label><textarea class="form-textarea" id="hr-body" placeholder="What's happening..."></textarea></div>
    <div class="form-field"><label class="form-label">Phase</label><select class="form-select" id="hr-phase">${PHASES.map(p=>`<option>${p.name}</option>`).join('')}</select></div>
    <div class="form-field"><label class="form-label">Milestones (optional)</label><input class="form-input" id="hr-ms1" placeholder="Milestone 1" style="margin-bottom:6px"><input class="form-input" id="hr-ms2" placeholder="Milestone 2" style="margin-bottom:6px"><input class="form-input" id="hr-ms3" placeholder="Milestone 3"></div>
    <button class="btn-primary" onclick="pushHRUpdate()">📣 Push to Team</button>
    <div style="height:12px"></div>`;

  document.getElementById('hrFormArea').style.display = canEdit&&hrFormVisible ? 'block' : 'none';

  document.getElementById('hrUpdatesList').innerHTML = HR_UPDATES.map((u,ui)=>`
    <div class="hr-update">
      <div class="hru-top">
        <div><div class="hru-title">${u.title}</div><span class="badge badge-phase" style="margin-top:4px;display:inline-block">${u.phase}</span></div>
        <div class="hru-date">${u.date}</div>
      </div>
      <div class="hru-body">${u.body}</div>
      <div>${u.milestones.map((ms,mi)=>`
        <div class="ms-row">
          <div class="cb ${u.done[mi]?'done':''}" onclick="toggleHRMs(${ui},${mi})"><svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg></div>
          <div class="ms-text ${u.done[mi]?'done-ms':''}">${ms}</div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleHRForm(){ hrFormVisible=!hrFormVisible; renderHRPanel(); }
function toggleHRMs(ui,mi){ HR_UPDATES[ui].done[mi]=!HR_UPDATES[ui].done[mi]; renderHRPanel(); }
function pushHRUpdate(){
  const title=document.getElementById('hr-title').value.trim();
  const body=document.getElementById('hr-body').value.trim();
  if(!title||!body){ toast('Fill title and body!'); return; }
  const ms=[document.getElementById('hr-ms1').value.trim(),document.getElementById('hr-ms2').value.trim(),document.getElementById('hr-ms3').value.trim()].filter(Boolean);
  HR_UPDATES.unshift({title,body,phase:document.getElementById('hr-phase').value.split('—')[0].trim(),milestones:ms,done:ms.map(()=>false),date:'Just now',by:CU.id});
  hrFormVisible=false; renderHRPanel(); toast('📣 Update pushed!');
}

function renderLeadPanel(){
  const isLead = CU.isLead;
  document.getElementById('leadOverlayTitle').textContent = isLead ? `🗂️ ${CU.short}'s Field` : '🗂️ All Lead Updates';
  document.getElementById('leadPostBtn').style.display = isLead ? 'flex' : 'none';

  document.getElementById('leadFormArea').innerHTML = `
    <div class="form-section-title">Post Field Update</div>
    <div class="form-field"><label class="form-label">Title</label><input class="form-input" id="ld-title" placeholder="Update title..."></div>
    <div class="form-field"><label class="form-label">Update</label><textarea class="form-textarea" id="ld-body" placeholder="What's happening in your field?"></textarea></div>
    <button class="btn-primary" onclick="pushLeadUpdate()">📤 Post Update</button><div style="height:12px"></div>`;

  document.getElementById('leadFormArea').style.display = isLead&&leadFormVisible ? 'block' : 'none';

  let updates = isLead && CU.id!=='vivek' ? LEAD_UPDATES.filter(l=>l.leadId===CU.id) : LEAD_UPDATES;
  const m_map = Object.fromEntries(TEAM.map(m=>[m.id,m]));

  document.getElementById('leadUpdatesList').innerHTML = updates.length ? updates.map(l=>{
    const m = m_map[l.leadId];
    return `<div class="lead-upd">
      <div class="lu-hdr">
        <div class="lu-av avatar" style="background:${m.bg};color:${m.color};width:36px;height:36px;font-size:11px">${m.initials}</div>
        <div class="lu-info"><div class="lu-name">${m.name}</div><div class="lu-field">${m.leadField||m.role.split('·')[0]}</div></div>
        <div class="lu-time">${l.date}</div>
      </div>
      <div class="lu-title">${l.title}</div>
      <div class="lu-body">${l.body}</div>
      <span class="lu-tag" style="background:${m.bg};color:${m.color}">${l.tag}</span>
    </div>`;
  }).join('') : '<div class="empty-view"><div class="ev-icon">📝</div><div class="ev-text">No updates yet</div></div>';
}

function toggleLeadForm(){ leadFormVisible=!leadFormVisible; renderLeadPanel(); }
function pushLeadUpdate(){
  const title=document.getElementById('ld-title').value.trim();
  const body=document.getElementById('ld-body').value.trim();
  if(!title||!body){ toast('Fill title and body!'); return; }
  LEAD_UPDATES.unshift({leadId:CU.id,title,body,tag:'📤 New',date:'Just now'});
  leadFormVisible=false; renderLeadPanel(); toast('📤 Update posted!');
}
